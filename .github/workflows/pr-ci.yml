# Contributor CI: build and run the full XCTest suite on every pull request
# that touches iOS-relevant code. PRs that only touch docs (markdown, docs/,
# community files) or the Android project skip the macOS runner entirely and
# pass via the cheap gate job; the Android project has its own workflow
# (android-ci.yml).
#
# The required branch-protection check is "CI Gate", not "Build and Test":
# a skipped required check would block merges forever, so the gate always
# runs and passes when the suite either succeeded or was legitimately skipped.
#
# Uses no repository secrets, so PRs from forks get green CI too.
#
# Code signing is disabled (CODE_SIGNING_ALLOWED=NO) — fine for compile/test
# runs per ios/TESTFLIGHT.md; the "simulator installs must be signed" rule applies
# to manual simulator testing, not CI.

name: PR CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_ios: ${{ steps.filter.outputs.run_ios }}
    steps:
      - name: Classify changed files
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')
          echo "Changed files:"
          echo "${files}"
          # Fail closed: anything NOT on the allowlist of paths that can't
          # affect the iOS build (docs, community files, the Android project
          # and its workflow) triggers the full suite — including workflow,
          # project, and config changes.
          non_ios=$(echo "${files}" | grep -vE '^(docs/.*|LICENSE|\.gitignore|\.github/ISSUE_TEMPLATE/.*|\.github/CODEOWNERS|\.github/dependabot\.yml|\.github/FUNDING\.yml|android/.*|\.github/workflows/android-ci\.yml|.*\.md)$' || true)
          if [[ -n "${non_ios}" ]]; then
            echo "iOS-relevant changes detected — running the full suite:"
            echo "${non_ios}"
            echo "run_ios=true" >> "$GITHUB_OUTPUT"
          else
            echo "No iOS-relevant changes — skipping the macOS runner."
            echo "run_ios=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Build and Test
    needs: changes
    if: needs.changes.outputs.run_ios == 'true'
    runs-on: macos-26
    timeout-minutes: 90

    env:
      PROJECT_PATH: ios/HermesMobile.xcodeproj
      SCHEME: HermesMobile

    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Select simulator
        id: sim
        run: |
          set -euo pipefail
          name=$(xcrun simctl list devices available --json | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          phones = [
              device["name"]
              for runtime, devices in data["devices"].items()
              if "iOS" in runtime
              for device in devices
              if device.get("isAvailable") and device["name"].startswith("iPhone")
          ]
          preferred = "iPhone 17"
          print(preferred if preferred in phones else phones[0] if phones else "")
          ')
          if [[ -z "${name}" ]]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Using simulator: ${name}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Build and test
        env:
          SIMULATOR_NAME: ${{ steps.sim.outputs.name }}
        run: |
          set -euo pipefail
          xcodebuild test \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -destination "platform=iOS Simulator,name=${SIMULATOR_NAME}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore

  gate:
    name: CI Gate
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          set -euo pipefail
          echo "changes: ${{ needs.changes.result }}"
          echo "test: ${{ needs.test.result }}"
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "Path detection failed — failing the gate." >&2
            exit 1
          fi
          case "${{ needs.test.result }}" in
            success|skipped) echo "Gate passed." ;;
            *) echo "Build and Test did not pass — failing the gate." >&2; exit 1 ;;
          esac
